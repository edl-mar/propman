# ── Deep nesting ─────────────────────────────────────────────────────────────
# Tests multi-level compacting
app.ui.layout.sidebar.header.title=Sidebar Title
app.ui.layout.sidebar.header.subtitle=Sidebar Subtitle
app.ui.layout.sidebar.footer.copyright=© 2024 Acme
app.ui.layout.sidebar.footer.version=v1.0.0
app.ui.layout.main.toolbar.save=Save
app.ui.layout.main.toolbar.cancel=Cancel
app.ui.layout.main.toolbar.undo=Undo
app.ui.layout.main.content.placeholder=Start typing…
app.ui.layout.main.content.empty.title=Nothing here yet
app.ui.layout.main.content.empty.hint=Add an item to get started

# ── Mixed depth siblings ─────────────────────────────────────────────────────
# Lone leaf next to a group — the lone leaf should NOT get a group header
app.settings.theme=dark
app.settings.locale.language=en
app.settings.locale.region=AT
app.settings.locale.calendar=gregorian
app.settings.notifications.email.digest=daily
app.settings.notifications.email.unsubscribe=Unsubscribe
app.settings.notifications.push.enabled=true
app.settings.notifications.push.sound=chime
app.confirm3.delete=Are you sure you want to delete this item? \
This action cannot be undone and all associated data will be permanently removed.
app.confirm3.discard=Loading…

# ── Stripping: safe to strip one level only ───────────────────────────────
# Stripping 'common.' is safe. Stripping 'common.responses.' would create
# a duplicate 'yes' key (see line 1 vs line 4 after stripping).
common.yes=yes
common.no=no
common.responses.yes=Confirmed
common.responses.no=Denied
common.responses.maybe=Perhaps

# ── Stripping: safe to strip two levels ───────────────────────────────────
# 'copy.target.button.label' and 'copy.target.button.icon' — stripping
# 'copy.' and then 'target.' is safe at both levels.
copy.target.button.label=Copy
copy.target.button.icon=clipboard
copy.target.tooltip.text=Copied!
copy.target.tooltip.duration=2000

# ── Stripping: blocked by sibling key clash ───────────────────────────────
# 'action.save' and 'action.toolbar.save' — stripping 'action.' would leave
# a bare 'save' AND a 'toolbar.save', which is fine. But stripping 'action.toolbar.'
# is not applicable since not all keys share that prefix.
# (Tests that stripping correctly only strips shared prefixes.)
action.save=Save
action.delete=Delete
action.toolbar.save=Save Document
action.toolbar.saveAs=Save As…
action.toolbar.export=Export

# ── Stripping: deep shared prefix with early-exit collision ───────────────
# All share 'report.'. Stripping 'report.' leaves 'summary' (bare) and
# 'summary.title' etc — 'summary' would collide with 'summary.title' parent.
# So stripping stops at 'report.'.
report.summary=Executive Summary
report.summary.title=Report Title
report.summary.author=Author Name
report.detail.chart.label=Chart
report.detail.chart.noData=No data available
report.detail.table.header.date=Date
report.detail.table.header.amount=Amount
report.detail.table.footer=End of report

http.something=something
http.status=status
http.status.200=OK
http.status.400=Bad Request
http.status.401=Unauthorized
http.status.403=Forbidden
http.status.404=Not Found
http.status.500=Internal Server Error
http.status.detail.something.msg.firstmessage=firstmessage
http.status.detail.something.msg.secondmessage=secondmessage
http.status.detail.something.notmsg=notmsg
http.status.x=x
http.y=y
z.entry=first entry after




